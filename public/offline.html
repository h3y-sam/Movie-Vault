<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | StremioTV</title>
  <style>
    :root {
      --bg-color: #09090b;
      --text-color: #f4f4f5;
      --accent-color: #e11d48;
      --accent-hover: #be123c;
      --muted-color: #a1a1aa;
      --card-bg: #18181b;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 450px;
      padding: 2.5rem;
      background: var(--card-bg);
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border: 1px solid #27272a;
      margin: 1rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.75rem 0;
      color: var(--text-color);
    }

    p {
      color: var(--muted-color);
      line-height: 1.6;
      margin: 0 0 2rem 0;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-block;
      background-color: var(--accent-color);
      color: #ffffff;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      font-size: 1rem;
      box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.2);
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .brand {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #52525b;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You are offline</h1>
    <p>It seems you lost connection to the server. Check your network connection and try again to stream your favorite shows.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="brand">StremioTV</div>
  </div>
</body>
</html>
